name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "examples/**"
      - "scripts/render_examples.py"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # System libraries the headless klayout.lay renderer needs on Linux.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb libgl1 libegl1 libxkbcommon0 libfontconfig1 libdbus-1-3

      - name: Install Python dependencies
        run: pip install klayout "mkdocs-material>=9.5"

      - name: Render example screenshots
        run: xvfb-run -a python scripts/render_examples.py

      - name: Build site
        run: mkdocs build --strict

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
